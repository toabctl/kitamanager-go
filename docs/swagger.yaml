    type: object
  handlers.UpdateGroupRequest:
    properties:
      active:
        example: false
        type: boolean
      name:
        example: Administrators Updated
        type: string
    type: object
  handlers.UpdateOrganizationRequest:
    properties:
      active:
        example: false
        type: boolean
      name:
        example: Acme Corp Updated
        type: string
    type: object
  models.Group:
