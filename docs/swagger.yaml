          schema:
            $ref: '#/definitions/github_com_eenemeene_kitamanager-go_internal_models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List employee contracts
      tags:
      - employees
    post:
      consumes:
      - application/json
      description: |-
        Create a new contract for an employee.

        **Contract Date Rules:**
        - Both `from` and `to` dates are inclusive (the contract is active on both dates)
        - Same-day contracts are allowed (`from` == `to`)
        - Contracts must not overlap with existing contracts
        - "Touching" contracts (where contract A ends on the same day contract B starts) are considered overlapping
        - To transition between contracts, the new contract must start the day AFTER the previous one ends

        **Example:** If contract A ends on 2025-01-31, contract B must start on 2025-02-01 or later.
      parameters:
      - description: Organization ID
        in: path
        name: orgId
        required: true
        type: integer
      - description: Employee ID
        in: path
        name: id
        required: true
        type: integer
      - description: Contract data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_eenemeene_kitamanager-go_internal_models.EmployeeContractCreateRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_eenemeene_kitamanager-go_internal_models.EmployeeContractResponse'
        "400":
          description: Invalid request (e.g., from date after to date)
          schema:
            $ref: '#/definitions/github_com_eenemeene_kitamanager-go_internal_models.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_eenemeene_kitamanager-go_internal_models.ErrorResponse'
        "404":
          description: Employee not found
          schema:
            $ref: '#/definitions/github_com_eenemeene_kitamanager-go_internal_models.ErrorResponse'
        "409":
          description: Contract overlaps with existing contract
          schema:
