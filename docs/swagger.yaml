      active:
        example: true
        type: boolean
      created_at:
        example: "2024-01-15T10:30:00Z"
        type: string
      created_by:
        example: admin@example.com
        type: string
      id:
        example: 1
        type: integer
      name:
        example: Administrators
        type: string
      organizations:
        items:
          $ref: '#/definitions/models.Organization'
        type: array
      updated_at:
        example: "2024-01-15T10:30:00Z"
