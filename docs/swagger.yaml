      active:
        example: true
        type: boolean
      name:
        example: Administrators
        type: string
    required:
    - name
    type: object
  handlers.CreateOrganizationRequest:
    properties:
      active:
        example: true
        type: boolean
      name:
        example: Acme Corp
        type: string
    required:
    - name
    type: object
  handlers.ErrorResponse:
    properties:
      error:
        example: error message
        type: string
    type: object
  handlers.LoginRequest:
