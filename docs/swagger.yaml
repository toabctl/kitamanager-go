  /api/v1/organizations/{orgId}/statistics/financials:
    get:
      consumes:
      - application/json
      description: |-
        Returns monthly data points with income (government funding), expenses (salaries, employer costs, operating costs), and balance.
        Income is calculated from children's contract properties matched against government funding.
        Salary costs use pay plan entries pro-rated by weekly hours. Employer costs apply the period's contribution rate.
        Operating costs sum active cost entries for the organization.
        Each data point includes optional breakdowns: funding_details (per funding property), budget_item_details (per budget item), and salary_details (per staff category).
      parameters:
      - description: Organization ID
        in: path
        name: orgId
        required: true
        type: integer
      - description: Start date (YYYY-MM-DD), defaults to 12 months ago
        in: query
        name: from
        type: string
      - description: End date (YYYY-MM-DD), defaults to 6 months ahead
        in: query
        name: to
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_eenemeene_kitamanager-go_internal_models.FinancialResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_eenemeene_kitamanager-go_internal_models.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_eenemeene_kitamanager-go_internal_models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_eenemeene_kitamanager-go_internal_models.ErrorResponse'
