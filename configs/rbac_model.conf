# RBAC model with organization-based multi-tenancy (domains)
#
# Request: subject (user), domain (organization), object (resource), action
# Supports role inheritance within domains

[request_definition]
r = sub, dom, obj, act

[policy_definition]
p = sub, dom, obj, act

[role_definition]
# g = user, role, domain (organization)
# Example: g, user:1, admin, org:1 means "user 1 has admin role in org 1"
g = _, _, _

[policy_effect]
e = some(where (p.eft == allow))

[matchers]
# Match if user has the role in the domain (or wildcard), and the policy allows the action
# g(r.sub, p.sub, "*") checks for global role assignments (superadmin)
# p.dom == "*" in policy means the policy applies to all domains
m = (g(r.sub, p.sub, r.dom) || g(r.sub, p.sub, "*")) && (p.dom == r.dom || p.dom == "*") && r.obj == p.obj && r.act == p.act
