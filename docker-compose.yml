services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=kitamanager
      - DB_PASSWORD=kitamanager
      - DB_NAME=kitamanager
      - DB_SSLMODE=disable
      - JWT_SECRET=your-super-secret-jwt-key-change-in-production
      - SERVER_PORT=8080
      # Admin seeding - set these to create initial admin user
      - SEED_ADMIN_EMAIL=superadmin@example.com
      - SEED_ADMIN_PASSWORD=admin
      - SEED_ADMIN_NAME=Super Admin
      - SEED_RBAC_POLICIES=true
      # CORS configuration
      - CORS_ALLOW_ORIGINS=http://localhost:3000,http://localhost:3001,http://localhost:8080
      - CORS_ALLOW_CREDENTIALS=true
      # Logging
      - LOG_LEVEL=info
      - LOG_FORMAT=json
      # Environment (development, staging, production)
      - ENVIRONMENT=development
      # SMTP configuration (optional in development — emails are logged instead of sent)
      # - SMTP_HOST=smtp.example.com
      # - SMTP_PORT=587
      # - SMTP_USER=
      # - SMTP_PASSWORD=
      # - SMTP_FROM=noreply@example.com
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:18-alpine
    environment:
      - POSTGRES_USER=kitamanager
      - POSTGRES_PASSWORD=kitamanager
      - POSTGRES_DB=kitamanager
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kitamanager"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
