version: "2"
linters:
  enable:
    - forbidigo
    - gosec
    - misspell
    - prealloc
    - unconvert
    - unparam
  settings:
    forbidigo:
      forbid:
        - pattern: 'c\.JSON\(http\.StatusNoContent'
          msg: "Use c.Status(http.StatusNoContent) instead of c.JSON(http.StatusNoContent, ...) — 204 must not have a body"
    gosec:
      excludes:
        - G104
        - G117
        - G706
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - gosec
          - unparam
        path: _test\.go
      - linters:
          - govet
        text: 'shadow: declaration of "err"'
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/eenemeene/kitamanager-go
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
