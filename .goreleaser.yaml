version: 2

builds:
  - id: kitamanager-api
    main: ./cmd/api
    binary: kitamanager-api
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/eenemeene/kitamanager-go/internal/version.GitVersion={{ .Version }}
      - -X github.com/eenemeene/kitamanager-go/internal/version.GitCommit={{ .FullCommit }}
      - -X github.com/eenemeene/kitamanager-go/internal/version.BuildTime={{ .Date }}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: checksums.txt

sboms:
  - artifacts: archive

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
