version: 2

builds:
  - id: kitamanager-api
    main: ./cmd/api
    binary: kitamanager-api
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/eenemeene/kitamanager-go/internal/version.GitCommit={{ .FullCommit }}
      - -X github.com/eenemeene/kitamanager-go/internal/version.BuildTime={{ .Date }}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: checksums.txt

sboms:
  - artifacts: archive

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

dockers:
  - image_templates:
      - "ghcr.io/eenemeene/kitamanager-go:{{ .Version }}-amd64"
    use: buildx
    dockerfile: Dockerfile
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--build-arg=GIT_COMMIT={{ .FullCommit }}"
      - "--build-arg=BUILD_TIME={{ .Date }}"
  - image_templates:
      - "ghcr.io/eenemeene/kitamanager-go:{{ .Version }}-arm64"
    use: buildx
    goarch: arm64
    dockerfile: Dockerfile
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--build-arg=GIT_COMMIT={{ .FullCommit }}"
      - "--build-arg=BUILD_TIME={{ .Date }}"

docker_manifests:
  - name_template: "ghcr.io/eenemeene/kitamanager-go:{{ .Version }}"
    image_templates:
      - "ghcr.io/eenemeene/kitamanager-go:{{ .Version }}-amd64"
      - "ghcr.io/eenemeene/kitamanager-go:{{ .Version }}-arm64"
  - name_template: "ghcr.io/eenemeene/kitamanager-go:latest"
    image_templates:
      - "ghcr.io/eenemeene/kitamanager-go:{{ .Version }}-amd64"
      - "ghcr.io/eenemeene/kitamanager-go:{{ .Version }}-arm64"
