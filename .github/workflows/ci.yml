name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GO_VERSION: '1.25.7'
  NODE_VERSION: '22'
  MIN_COVERAGE: 35

jobs:
  api-lint:
    name: API Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest

      - name: Lint API
        run: make api-lint

  web-lint:
    name: Web Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install web dependencies
        run: make web-install

      - name: Lint web
        run: make web-lint

      - name: Check web formatting
        run: make web-format-check

      - name: Type-check web
        run: make web-type-check

  api-test:
    name: API Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run API tests
        run: make api-test-coverage

      - name: Check coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < ${{ env.MIN_COVERAGE }}" | bc -l) )); then
            echo "Coverage ${COVERAGE}% is below minimum threshold of ${{ env.MIN_COVERAGE }}%"
            exit 1
          fi

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.out
          fail_ci_if_error: false

  web-test:
    name: Web Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install web dependencies
        run: make web-install

      - name: Run web tests
        run: make web-test-coverage

  api-integration:
    name: API Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: kitamanager
          POSTGRES_PASSWORD: kitamanager
          POSTGRES_DB: kitamanager_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kitamanager"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run integration tests
        env:
          TEST_DB_TYPE: postgres
          TEST_DB_HOST: localhost
          TEST_DB_PORT: 5432
          TEST_DB_USER: kitamanager
          TEST_DB_PASSWORD: kitamanager
          TEST_DB_NAME: kitamanager_test
        run: make api-test-integration

  api-fuzz:
    name: API Fuzz Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run fuzz tests
        run: make api-test-fuzz

  api-build:
    name: API Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build API
        run: make api-build

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

  web-build:
    name: Web Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install web dependencies
        run: make web-install

      - name: Build web
        run: make web-build

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Run gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec ./...

  docker:
    name: Docker Build & Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: kitamanager-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: kitamanager-api:${{ github.sha }}
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  api-contract:
    name: API Contract Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: kitamanager
          POSTGRES_PASSWORD: kitamanager
          POSTGRES_DB: kitamanager_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kitamanager"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run API contract tests
        env:
          TEST_DB_TYPE: postgres
          TEST_DB_HOST: localhost
          TEST_DB_PORT: 5432
          TEST_DB_USER: kitamanager
          TEST_DB_PASSWORD: kitamanager
          TEST_DB_NAME: kitamanager_test
        run: make api-test-contract

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [api-build, web-build]
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: kitamanager
          POSTGRES_PASSWORD: kitamanager
          POSTGRES_DB: kitamanager
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kitamanager"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install web dependencies
        run: make web-install

      - name: Install Playwright browsers
        run: make web-playwright-install

      - name: Build web
        run: make web-build

      - name: Build API
        run: make api-build

      - name: Start API server
        run: |
          DATABASE_URL="postgres://kitamanager:kitamanager@localhost:5432/kitamanager?sslmode=disable" \
          SEED_ADMIN_EMAIL=admin@example.com \
          SEED_ADMIN_PASSWORD=supersecret \
          SEED_ADMIN_NAME=admin \
          SEED_RBAC_POLICIES=true \
          SEED_TEST_DATA=true \
          LOGIN_RATE_LIMIT_PER_MINUTE=0 \
          CORS_ALLOW_ORIGINS="http://localhost:3000" \
          GOVERNMENT_FUNDING_SEED_PATH=configs/government-fundings/berlin.yaml \
          GOVERNMENT_FUNDING_SEED_NAME=Berlin \
          ./bin/kitamanager-api &
          API_PID=$!
          # Wait for API to be ready with retry loop
          for i in {1..30}; do
            # Check if process is still running
            if ! kill -0 $API_PID 2>/dev/null; then
              echo "API process died"
              exit 1
            fi
            # Try the health check
            if curl -sf http://localhost:8080/api/v1/health; then
              echo "API is ready"
              exit 0
            fi
            echo "Waiting for API... ($i/30)"
            sleep 1
          done
          echo "API failed to start - checking what's listening on 8080:"
          ss -tlnp | grep 8080 || echo "Nothing on 8080"
          echo "Process status:"
          ps aux | grep kitamanager || echo "No kitamanager process"
          exit 1

      - name: Start Next.js server
        run: |
          cd frontend && npm run build && npm run start &
          # Wait for Next.js to be ready
          for i in {1..30}; do
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "Next.js is ready"
              break
            fi
            echo "Waiting for Next.js... ($i/30)"
            sleep 1
          done

      - name: Run E2E tests
        run: cd frontend && npx playwright test --project=chromium
        env:
          BASE_URL: http://localhost:3000
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/test-results/
          retention-days: 7
