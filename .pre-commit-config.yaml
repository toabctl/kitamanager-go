repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.6.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]

  - repo: https://github.com/golangci/golangci-lint
    rev: v1.64.5
    hooks:
      - id: golangci-lint

  - repo: local
    hooks:
      - id: go-test
        name: go test
        entry: go test -race ./...
        language: system
        types: [go]
        pass_filenames: false

      - id: go-build
        name: go build
        entry: go build -o /dev/null ./cmd/api
        language: system
        types: [go]
        pass_filenames: false

      - id: vue-type-check
        name: vue type check
        entry: bash -c 'cd web && npm run type-check'
        language: system
        files: ^web/.*\.(vue|ts)$
        pass_filenames: false

      - id: vue-lint
        name: vue eslint
        entry: bash -c 'cd web && npm run lint'
        language: system
        files: ^web/.*\.(vue|ts|js)$
        pass_filenames: false

      - id: vue-stylelint
        name: vue stylelint
        entry: bash -c 'cd web && npm run lint:style'
        language: system
        files: ^web/.*\.(vue|css)$
        pass_filenames: false

      - id: vue-format-check
        name: vue prettier check
        entry: bash -c 'cd web && npm run format:check'
        language: system
        files: ^web/.*\.(vue|ts|js|css|json)$
        pass_filenames: false

      - id: vue-test
        name: vue unit tests
        entry: bash -c 'cd web && npm run test:run'
        language: system
        files: ^web/.*\.(vue|ts|js)$
        pass_filenames: false
