repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-added-large-files

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.3.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]

  - repo: https://github.com/golangci/golangci-lint
    rev: v2.8.0
    hooks:
      - id: golangci-lint

  - repo: local
    hooks:
      - id: go-mod-tidy
        name: go mod tidy
        entry: bash -c 'go mod tidy && git diff --exit-code go.mod go.sum'
        language: system
        types: [go]
        pass_filenames: false

      - id: go-test
        name: go test
        entry: go test -race ./...
        language: system
        types: [go]
        pass_filenames: false

      - id: go-integration-test
        name: go integration test
        entry: go test -tags=integration ./internal/integration/...
        language: system
        types: [go]
        pass_filenames: false

      - id: go-contract-test
        name: go contract test
        entry: go test -tags=contract ./internal/contract/...
        language: system
        types: [go]
        pass_filenames: false

      - id: go-build
        name: go build
        entry: make api-build
        language: system
        types: [go]
        pass_filenames: false

      - id: goreleaser-check
        name: goreleaser check
        entry: bash -c 'if command -v goreleaser >/dev/null 2>&1; then goreleaser check; else echo "goreleaser not installed, skipping (validated in CI)"; fi'
        language: system
        files: (\.goreleaser\.yaml|go\.mod|cmd/|internal/)
        pass_filenames: false

      - id: govulncheck
        name: govulncheck
        entry: bash -c 'go install golang.org/x/vuln/cmd/govulncheck@latest && govulncheck ./...'
        language: system
        types: [go]
        pass_filenames: false

      - id: swagger-check
        name: swagger docs check
        entry: bash -c 'go install github.com/swaggo/swag/cmd/swag@latest && make swagger-docs && git diff --exit-code docs/'
        language: system
        types: [go]
        pass_filenames: false

      - id: web-type-check
        name: web type check
        entry: bash -c 'cd frontend && npm run type-check'
        language: system
        files: ^frontend/.*\.(tsx?|jsx?)$
        pass_filenames: false

      - id: web-lint
        name: web eslint
        entry: bash -c 'cd frontend && npm run lint'
        language: system
        files: ^frontend/.*\.(tsx?|jsx?)$
        pass_filenames: false

      - id: web-format-check
        name: web prettier check
        entry: bash -c 'cd frontend && npm run format:check'
        language: system
        files: ^frontend/.*\.(tsx?|jsx?|css|json)$
        pass_filenames: false

      - id: web-test
        name: web unit tests with coverage
        entry: bash -c 'cd frontend && npx jest --coverage'
        language: system
        files: ^frontend/.*\.(tsx?|jsx?)$
        pass_filenames: false

      - id: website-build
        name: website hugo build
        entry: bash -c 'cd website && hugo --minify'
        language: system
        files: ^website/
        pass_filenames: false
